<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>WebXR AR Paint</title>
    <style>
      :root {
        --bg: rgba(12, 18, 28, 0.72);
        --panel: rgba(255, 255, 255, 0.15);
        --line: rgba(255, 255, 255, 0.24);
        --text: #f4f7fb;
        --accent: #ff835c;
        --shadow: 0 16px 36px rgba(0, 0, 0, 0.32);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #264257 0%, #111824 55%, #090c12 100%);
        color: var(--text);
        font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
        touch-action: none;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        left: 0;
        right: 0;
        z-index: 10;
        pointer-events: none;
      }

      .topbar {
        top: 0;
        display: flex;
        justify-content: center;
        padding: calc(env(safe-area-inset-top, 0px) + 12px) 12px 0;
      }

      .panel {
        width: min(720px, 100%);
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 22px;
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        padding: 12px;
        pointer-events: auto;
      }

      .toolbar-group {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
      }

      .toolbar label,
      .toolbar span,
      .toolbar button {
        font-size: 14px;
      }

      .swatches {
        display: flex;
        gap: 8px;
      }

      .swatch {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        cursor: pointer;
      }

      .swatch.active {
        outline: 3px solid rgba(255, 255, 255, 0.9);
        outline-offset: 2px;
      }

      input[type="range"] {
        width: 120px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        cursor: pointer;
        color: #0d1320;
        background: #edf2f7;
        font-weight: 700;
      }

      button.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .bottombar {
        bottom: 0;
        display: flex;
        justify-content: center;
        padding: 0 12px calc(env(safe-area-inset-bottom, 0px) + 14px);
      }

      .hint {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        padding: 12px 16px;
        font-size: 14px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 14px rgba(255, 131, 92, 0.9);
      }

      .start-screen {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 131, 92, 0.28), transparent 24%),
          radial-gradient(circle at 80% 30%, rgba(72, 197, 255, 0.22), transparent 22%),
          linear-gradient(180deg, rgba(6, 12, 20, 0.78), rgba(6, 12, 20, 0.92));
      }

      .start-card {
        width: min(520px, 100%);
        padding: 28px;
        border-radius: 28px;
        background: rgba(9, 15, 24, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 44px);
      }

      p {
        margin: 0 0 14px;
        line-height: 1.6;
      }

      .start-button {
        width: 100%;
        margin-top: 10px;
        padding: 14px 18px;
        font-size: 18px;
        background: linear-gradient(135deg, #ff835c, #ffd166);
      }

      .status {
        margin-top: 14px;
        min-height: 24px;
        color: #ffd6c9;
        font-size: 14px;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="overlay" class="hud topbar hidden">
      <div class="panel">
        <div class="toolbar">
          <div class="toolbar-group">
            <span>Color</span>
            <div id="swatches" class="swatches"></div>
          </div>
          <div class="toolbar-group">
            <label for="size">Size</label>
            <input id="size" type="range" min="0.01" max="0.08" step="0.005" value="0.03" />
            <span id="sizeValue">3.0cm</span>
          </div>
          <div class="toolbar-group">
            <button id="undo" class="secondary" type="button">Undo</button>
            <button id="clear" class="secondary" type="button">Clear</button>
          </div>
        </div>
      </div>
    </div>

    <div id="hintBar" class="hud bottombar hidden">
      <div class="panel hint">
        <span class="dot"></span>
        <span>画面を押している間だけ描けます。端末を動かすと空間に線が残ります。</span>
      </div>
    </div>

    <div id="startScreen" class="start-screen">
      <div class="start-card">
        <h1>WebXR AR Paint</h1>
        <p>スマホを筆のように動かして、現実空間に3Dの線を描くARワークショップ用アプリです。</p>
        <p>Android の WebXR 対応ブラウザで開き、「ARを開始」を押してください。</p>
        <button id="startButton" class="start-button" type="button">ARを開始</button>
        <div id="status" class="status"></div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
