<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>VR DoF Tester - HMD 3DoF</title>
    <link rel="stylesheet" href="./shared_styles.css" />
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body class="xr-page">
    <div id="app">
      <div id="sceneHost"></div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="topbar">
        <div class="panel">
          <div class="controls">
            <div class="pill"><strong>Mode</strong><span>Cardboard HMD / 3DoF</span></div>
            <div class="pill good"><strong>Status</strong><span>両眼立体視 / 位置固定</span></div>
            <button id="exitButton" class="secondary" type="button">終了して戻る</button>
          </div>
        </div>
      </div>
      <div class="bottombar">
        <div class="panel hint">
          回転だけを反映し、頭を前へ出しても橋は近づかない 3DoF 比較用ページです。
        </div>
      </div>
    </div>

    <div id="startScreen" class="start-screen">
      <section class="launch-card">
        <p class="eyebrow">Cardboard HMD</p>
        <h2>3DoF ビュー</h2>
        <p>immersive-vr を使った両眼立体視ページです。位置移動は無効化し、回転だけを比較しやすくします。</p>
        <div id="supportLine" class="support-line"></div>
        <div class="mode-actions">
          <button id="startButton" class="primary" type="button">HMD 3DoF を始める</button>
          <a class="back-link" href="./index.html">ランチャーへ戻る</a>
        </div>
        <div id="status" class="status"></div>
      </section>
    </div>

    <script type="module" src="./mode_hmd_3dof.js"></script>
  </body>
</html>
