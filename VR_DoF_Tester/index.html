<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>VR DoF Tester</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <style>
      :root {
        --bg: rgba(8, 11, 18, 0.78);
        --panel: rgba(255, 255, 255, 0.1);
        --line: rgba(255, 255, 255, 0.16);
        --text: #eff5ff;
        --accent: #ff9f68;
        --cool: #76d0ff;
        --danger: #ffd6c2;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #21324d 0%, #0d1320 45%, #05070b 100%);
        color: var(--text);
        font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      .topbar,
      .bottombar {
        position: fixed;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        padding-left: 12px;
        padding-right: 12px;
      }

      .topbar {
        top: 0;
        padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
      }

      .bottombar {
        bottom: 0;
        padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      }

      .panel {
        width: min(760px, 100%);
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 22px;
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.34);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        padding: 12px;
        pointer-events: auto;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 16px;
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 14px;
      }

      .hint {
        padding: 12px 16px;
        font-size: 14px;
        line-height: 1.5;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 15px;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        color: #101722;
        background: linear-gradient(135deg, var(--accent), #ffd36e);
      }

      button.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      button.mode {
        min-width: 108px;
      }

      button.active {
        background: linear-gradient(135deg, var(--cool), #d7f4ff);
        color: #0f1824;
      }

      .start-screen {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(118, 208, 255, 0.18), transparent 20%),
          radial-gradient(circle at 80% 30%, rgba(255, 159, 104, 0.2), transparent 20%),
          linear-gradient(180deg, rgba(6, 10, 16, 0.82), rgba(6, 10, 16, 0.94));
      }

      .start-card {
        width: min(560px, 100%);
        padding: 28px;
        border-radius: 30px;
        background: rgba(10, 14, 22, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
        pointer-events: auto;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 5vw, 46px);
      }

      p {
        margin: 0 0 14px;
        line-height: 1.65;
      }

      .status {
        min-height: 24px;
        margin-top: 12px;
        color: var(--danger);
        font-size: 14px;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <a-scene
        id="scene"
        embedded
        background="color: #06111c"
        renderer="antialias: true; colorManagement: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        xr-mode-ui="enabled: false"
        webxr="referenceSpaceType: local-floor; optionalFeatures: local-floor, bounded-floor, hand-tracking"
      >
        <a-assets></a-assets>

        <a-entity light="type: ambient; color: #95b5ff; intensity: 0.9"></a-entity>
        <a-entity light="type: directional; color: #ffffff; intensity: 0.75" position="-1 3 2"></a-entity>
        <a-entity light="type: directional; color: #6ec8ff; intensity: 0.35" position="2 1 -3"></a-entity>

        <a-sky color="#0a1220"></a-sky>
        <a-entity
          geometry="primitive: sphere; radius: 190; thetaLength: 90; thetaStart: 90"
          material="color: #12263f; shader: flat; side: back; opacity: 0.95"
          position="0 -65 0"
        ></a-entity>

        <a-entity id="bridge-world" position="0 0 0">
          <a-box
            position="0 0.02 -2.5"
            depth="5"
            height="0.04"
            width="0.3"
            color="#9b724f"
            shadow="cast: true; receive: true"
          ></a-box>
          <a-box position="0 -0.08 0" width="0.8" height="0.12" depth="0.9" color="#484f63"></a-box>
          <a-box position="0 -0.6 0" width="0.2" height="1.1" depth="0.2" color="#30384c"></a-box>
          <a-box position="0 -1.65 -5.2" width="0.8" height="3.2" depth="0.8" color="#40465b"></a-box>
        </a-entity>

        <a-entity id="city"></a-entity>

        <a-entity
          id="danger-arrows"
          position="0 1.1 -1.4"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 16000; easing: linear"
        >
          <a-ring radius-inner="0.06" radius-outer="0.095" rotation="-90 0 0" color="#ff9f68"></a-ring>
          <a-cone position="0 0 -0.14" radius-bottom="0.04" radius-top="0" height="0.14" rotation="90 0 0" color="#ffd36e"></a-cone>
        </a-entity>

        <a-entity id="cameraRig" position="0 1.4 0">
          <a-camera
            id="mainCamera"
            position="0 0 0"
            look-controls="enabled: true; magicWindowTrackingEnabled: true; touchEnabled: true"
            wasd-controls="enabled: false"
          >
            <a-cursor
              id="gazeCursor"
              color="#ffcf8a"
              raycaster="objects: .gaze-target"
              geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.014"
              material="shader: flat; opacity: 0.9"
              visible="false"
            ></a-cursor>
          </a-camera>
        </a-entity>
      </a-scene>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="topbar">
        <div class="panel">
          <div class="controls">
            <div class="pill">
              <strong>Mode</strong>
              <button id="mode3Mono" class="secondary mode active" type="button">3DoF 単眼</button>
              <button id="mode3Stereo" class="secondary mode" type="button">3DoF ゴーグル</button>
              <button id="mode6" class="secondary mode" type="button">6DoF</button>
            </div>
            <div class="pill">
              <strong>Status</strong>
              <span id="modeLabel">3DoF 単眼: 回転のみ / 位置固定 / アイレベル140cm</span>
            </div>
            <button id="recenter" class="secondary" type="button">視点を戻す</button>
          </div>
        </div>
      </div>
      <div class="bottombar">
        <div class="panel hint">
          3DoF 単眼と 3DoF ゴーグルはどちらも位置固定です。6DoFでは位置移動が使える端末なら、前進やしゃがみで橋の見え方が変わります。
        </div>
      </div>
    </div>

    <div id="startScreen" class="start-screen">
      <div class="start-card">
        <h1>VR DoF Tester</h1>
        <p>高所の一本橋を使って、3DoF と 6DoF の違いを体感するワークショップ用 WebVR アプリです。</p>
        <p>最初は 3DoF 単眼で開始し、3DoF ゴーグル表示と 6DoF に切り替えて見え方の差を比べられます。</p>
        <button id="startButton" class="primary" type="button">スタート（VR開始）</button>
        <div id="status" class="status"></div>
      </div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
